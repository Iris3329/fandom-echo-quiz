<style>
:root{
    --bg:#0f0f0f;
    --panel:#171717;
    --panel2:#1f1f1f;
    --line:#000;
    --accent:#c8ff54;
    --accent2:#ff9f2f;
    --text:#f3f3f3;
    --sub:#9c9c9c;
    --muted:#666;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
}

body{
    min-height:100vh;
    background-color:var(--bg);
    color:var(--text);
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;
    background-image:
      linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size:4px 4px;
    overflow-x:hidden;
}

.pixel{
    font-family:'Press Start 2P', monospace;
}

.page{
    display:none;
    min-height:100vh;
    width:100%;
    align-items:center;
    justify-content:center;
    padding:20px;
    pointer-events:none;
}

.page.active{
    display:flex;
    pointer-events:auto;
}

.card{
    width:100%;
    max-width:430px;
    background:var(--panel);
    border:4px solid var(--line);
    box-shadow:8px 8px 0 #000;
    border-radius:8px;
    padding:26px;
    position:relative;
}

.watermark{
    margin-top:22px;
    text-align:center;
    font-size:11px;
    color:#5f5f5f;
    letter-spacing:2px;
}

.logo{
    text-align:center;
    color:var(--accent);
    line-height:1.55;
    font-size:20px;
    margin-bottom:14px;
}

.tag{
    text-align:center;
    color:#8f8f8f;
    font-size:11px;
    letter-spacing:2px;
    margin-bottom:34px;
}

.intro{
    text-align:center;
    color:#d0d0d0;
    line-height:2;
    font-size:14px;
    margin-bottom:34px;
}

.meta{
    text-align:center;
    color:#707070;
    font-size:12px;
    margin-bottom:34px;
    letter-spacing:1px;
}

.btn{
    width:100%;
    background:var(--accent);
    color:#000;
    border:none;
    border:4px solid #000;
    box-shadow:4px 4px 0 #000;
    padding:18px;
    border-radius:6px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    transition:0.08s;
    margin-top:12px;
}

.btn:active{
    transform:translate(2px,2px);
    box-shadow:2px 2px 0 #000;
}

.btn-dark{
    background:#232323;
    color:#fff;
}

.back{
    background:none;
    border:none;
    color:#7b7b7b;
    font-size:13px;
    cursor:pointer;
    margin-bottom:18px;
    transition:opacity 0.15s;
}
.back:disabled{
    opacity:0;
    pointer-events:none;
}

.progress-wrap{
    width:100%;
    height:12px;
    background:#101010;
    border:3px solid #000;
    margin-bottom:24px;
}

.progress{
    height:100%;
    width:0%;
    background:var(--accent);
    transition:0.25s;
}

.q{
    font-size:16px;
    line-height:1.9;
    margin-bottom:24px;
    color:#f2f2f2;
}

.options{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.option{
    width:100%;
    background:#151515;
    color:#fff;
    border:3px solid #000;
    box-shadow:inset 0 0 0 2px #2b2b2b;
    padding:15px;
    border-radius:6px;
    cursor:pointer;
    text-align:left;
    line-height:1.8;
    font-size:14px;
    transition:0.14s;
}

.option:hover{
    transform:translateY(-1px);
}

.option.selected{
    background:var(--accent);
    color:#000;
    box-shadow:none;
}

.poster{
    width:100%;
    overflow:hidden;
    border:4px solid #000;
    box-shadow:8px 8px 0 #000;
    border-radius:8px;
    margin-bottom:24px;
    background:#0f0f0f;
}

.poster img{
    width:100%;
    display:block;
}

.result-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
}

.echo-label{
    font-size:11px;
    color:#777;
    letter-spacing:2px;
    margin-bottom:8px;
}

.code{
    font-size:34px;
    color:var(--accent);
    text-align:center;
    margin-bottom:8px;
    line-height:1.3;
}

.name{
    font-size:24px;
    font-weight:800;
    text-align:center;
    margin-bottom:18px;
}

.summary{
    width:100%;
    background:#121212;
    border:3px solid #000;
    box-shadow:4px 4px 0 #000;
    border-radius:6px;
    padding:16px;
    margin-bottom:16px;
}

.stat-row{
    display:flex;
    justify-content:space-between;
    gap:10px;
    padding:8px 0;
    border-bottom:1px dashed #333;
    font-size:13px;
    line-height:1.5;
}

.stat-row:last-child{
    border-bottom:none;
}

.stat-key{
    color:#8a8a8a;
    min-width:88px;
}

.stat-val{
    text-align:right;
    color:#fff;
    flex:1;
}

.desc{
    width:100%;
    color:#d2d2d2;
    line-height:2;
    font-size:14px;
    margin:10px 0 18px;
    text-align:left;
}

.share-note{
    margin-top:8px;
    color:#6e6e6e;
    font-size:12px;
    text-align:center;
}

#result{
    align-items:flex-start;
    padding-bottom:60px;
}

.gallery{
    position:fixed;
    inset:0;
    background:#0c0c0c;
    z-index:999;
    display:none;
    overflow-y:auto;
    padding:20px;
}

.gallery.open{
    display:block;
}

.gallery-grid{
    max-width:460px;
    margin:0 auto;
}

.gallery-item{
    background:#171717;
    border:4px solid #000;
    box-shadow:6px 6px 0 #000;
    border-radius:8px;
    overflow:hidden;
    margin-bottom:20px;
}

.gallery-item img{
    width:100%;
    display:block;
}

.g-info{
    padding:16px;
}

.g-code{
    color:var(--accent);
    font-size:20px;
    margin-bottom:8px;
}

.g-name{
    font-size:18px;
    font-weight:700;
    margin-bottom:10px;
}

.g-desc{
    color:#c9c9c9;
    line-height:1.9;
    font-size:13px;
}

.toast{
    position:fixed;
    left:50%;
    bottom:28px;
    transform:translateX(-50%);
    background:#222;
    color:#fff;
    border:3px solid #000;
    box-shadow:4px 4px 0 #000;
    padding:14px 18px;
    z-index:9999;
    display:none;
    font-size:13px;
}

.small-link{
    display:block;
    width:100%;
    text-align:center;
    margin-top:10px;
    color:#7e7e7e;
    font-size:13px;
    cursor:pointer;
    background:none;
    border:none;
}
</style>
</head>

<body>

<div id="landing" class="page active">
  <div class="card">
    <div class="logo pixel">FANDOM ECHO</div>
    <div class="tag pixel">追星人格测试</div>
    <div class="intro">
      有些人相信在公车上，地铁中，在街道上只一瞬间四目交接便爱上一个人的故事，却取笑在屏幕或电视中看一眼便对一个人陷入爱的故事，这不像话，喜欢艺人也是爱，爱是平等的。
    </div>
    <div class="meta">15 QUESTIONS · 8 TYPES</div>
    <button class="btn" onclick="startTest()">进入测试</button>
    <div class="watermark pixel">©AMISOI</div>
  </div>
</div>

<div id="quiz" class="page">
  <div class="card">
    <button class="back" id="back-btn" onclick="prevQ()">← 上一题</button>
    <div class="progress-wrap"><div class="progress" id="progress"></div></div>
    <div class="q" id="q"></div>
    <div class="options" id="options"></div>
    <div class="watermark pixel">©AMISOI</div>
  </div>
</div>

<div id="result" class="page">
  <div class="card result-wrap">
    <div class="poster">
      <img id="poster-img" alt="result poster">
    </div>

    <div class="echo-label pixel">ECHO TYPE</div>
    <div class="code pixel" id="res-code"></div>
    <div class="name" id="res-name"></div>

    <div class="summary">
      <div class="stat-row">
        <div class="stat-key pixel">CLASS</div>
        <div class="stat-val" id="res-class"></div>
      </div>
      <div class="stat-row">
        <div class="stat-key pixel">TRAIT</div>
        <div class="stat-val" id="res-trait"></div>
      </div>
    </div>

    <div class="desc" id="res-desc"></div>

    <button class="btn" onclick="copyShare()">分享测试</button>
    <button class="btn btn-dark" onclick="openGallery()">查看全部人格</button>
    <button class="btn btn-dark" onclick="location.reload()">重新测试</button>

    <div class="watermark pixel">©AMISOI</div>
    <div class="share-note">喜欢艺人也是爱，爱是平等的。</div>
  </div>
</div>

<div id="gallery" class="gallery">
  <div class="gallery-grid" id="gallery-grid"></div>
  <button class="btn btn-dark" onclick="closeGallery()">查看结果</button>
</div>

<div id="toast" class="toast">已复制分享文案 ✨</div>

<script>
const questions = [
  {
    q: "你有一本能够记录人生的笔记本，当你写错了一段重要内容，你会：",
    options: [
      "随手划掉，能看到曾经写过的内容。",
      "覆盖修正，让它看起来尽量完整一些。",

      "不在乎，翻到新的一页继续写。"
    ]
  },
  {
    q: "你买了一个拼图，拼到最后发现少了一块核心碎片，你的第一反应是：",
    options: [
      "亲手画一块或找售后补发，必须让它完整。",
      "这么久努力的白费了，不想再看到，打乱收回盒子里。",
      "盯着缺口遗憾，但还是会把它挂起来，遗憾也是它的一部分。",
      "残缺美也很美，反正总有下一张拼图。"
    ]
  },
  {
    q: "陌生异国街头迷了路，你的状态：",
    options: [
      "会沉浸在情绪和氛围里，享受这种未知的宿命感。",
      "校对地图，必须按旅行计划走。",
      "如果感到不适，立刻回到安全区。",
      "寻找看有没有值得停留的点，没有就离开。"
    ]
  },
  {
    q: "手机里积压了很久的旧对话，某天翻到：",
    options: [
      "偶尔翻看，甚至会陷入一些旧的情绪。",
      "一条条查看处理归档，保持干净。",

      "根本不会点开，毫无意义。"
    ]
  },
  {
    q: "面对那些曾承载意义却已失去实用价值的旧物，你会：",

  },
  {
    q: "当你期待已久的‘演出’进入平淡的中场，而你开始感到索然无味",

  },
  {
    q: "当你悉心照顾的植物枯萎：",
    options: [
      "继续照顾直到彻底枯萎。",
      "查方法试着救回来。",
      "连盆带土换新的。",
      "扔掉，以后也不会在这方面投入精力了。"
    ]
  },
  {
    q: "当那个曾让你眼底有光的人，在你眼中开始变得‘平庸’：",
    options: [
      "反复回想最初为什么喜欢，试图找回共振。",
      "会慢慢降低关注，但会习惯性地留个位置。",
      "安静而决绝地清理掉所有痕迹，不再回头。",
      "毫无知觉地，被更亮的一束光吸引了注意力。"
    ]
  },
  {
    q: "当事态的发展完全脱离了你的掌控，甚至开始背离你的预期，你的第一本能是：",

    ]
  },
  {
    q: "你更喜欢哪种天气：",
    options: [
      "连绵细雨，潮湿、怀旧。",
      "稳定的晴天，平和可预测。",
      "暴雨后的清晨，洗刷后的决绝。",

      "时效性东西，过期就没意义了。",

  },
  {

    options: [

      "希望拥有长久而温暖的关系，如港湾般安稳。",
      "希望拥有自由选择的权利，如风般无拘无束。",
      "希望拥有属于自己的清晰轨道，如河流般坚定向前。"

  },
  {
    q: "如果你是一台电脑，最让你奔溃的故障是：",
    options: [

      "系统卡顿，每一步操作都慢半拍。",
      "突然死机，所有数据瞬间归零。",
      "提示“存储空间不足”，塞满了没用的垃圾文件。"

const results = [

  },
  {

  },
  {

  {

  {

const controlIdx = [0, 3, 5, 7, 10, 12, 14];
const attachIdx = [1, 2, 4, 6, 8, 9, 11, 13];

let cur = 0;
let control = 0;
let attach = 0;
let answers = new Array(15).fill(null);

function showPage(id){
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo(0, 0);
}

function startTest(){
  cur = 0;
  control = 0;
  attach = 0;
  answers = new Array(15).fill(null);
  showPage("quiz");
  renderQ();
}

function renderQ(){
  document.getElementById("progress").style.width = (cur / 15 * 100) + "%";
  document.getElementById("q").innerText = (cur + 1) + ". " + questions[cur].q;
  document.getElementById("back-btn").disabled = cur === 0;

  const wrap = document.getElementById("options");
  wrap.innerHTML = "";

  questions[cur].options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.innerText = opt;
    if (answers[cur] === i) btn.classList.add("selected");
    btn.onclick = () => choose(i);
    wrap.appendChild(btn);
  });
}

function choose(i){
  // highlight selected
  document.querySelectorAll(".option").forEach((b,idx) => {
    b.classList.toggle("selected", idx === i);
    b.style.pointerEvents = "none";
  });
  answers[cur] = i;
  setTimeout(() => {
    cur++;
    if (cur < 15) {
      renderQ();
    } else {
      calc();
    }
  }, 200);
}

function prevQ(){
  if (cur === 0) return;
  cur--;
  renderQ();
}

function calc(){
  control = 0;
  attach = 0;

  answers.forEach((a, idx) => {
    const score = [4, 3, 2, 1][a];
    if (controlIdx.includes(idx)) control += score;
    if (attachIdx.includes(idx)) attach += score;
  });

  const cH = control >= 21;
  const cM = control >= 15 && control <= 20;
  const cL = control <= 14;

  const aH = attach >= 24;
  const aM = attach >= 17 && attach <= 23;
  const aL = attach <= 16;

  let res;
  if (cH && aH) res = results[0];
  else if (cH && aL) res = results[1];
  else if (cL && aH) res = results[2];
  else if (cL && aL) res = results[3];
  else if (cH && aM) res = results[4];
  else if (cM && aL) res = results[5];
  else if (cL && aM) res = results[6];
  else res = results[7];

  document.getElementById("poster-img").src = res.img;
  document.getElementById("res-code").innerText = res.code;
  document.getElementById("res-name").innerText = res.name;
  document.getElementById("res-class").innerText = res.cls;
  document.getElementById("res-trait").innerText = res.trait;
  document.getElementById("res-desc").innerText = res.desc;

  // ==================== Google Analytics 追踪 ====================
  gtag('event', 'quiz_completed', {
    'personality_type': res.code,
    'personality_name': res.name
  });
  // ============================================================

  showPage("result");
}

function copyShare(){
  const code = document.getElementById("res-code").innerText;
  const name = document.getElementById("res-name").innerText;
  const cls = document.getElementById("res-class").innerText;
  const trait = document.getElementById("res-trait").innerText;

  const text =
`我的追星人格原来是【${code}｜${name}】

点击链接探索你的追星人格：
https://iris3329.github.io/fandom-echo-quiz/`;

  const toast = document.getElementById("toast");

  const showToast = () => {
    toast.style.display = "block";
    setTimeout(() => toast.style.display = "none", 1800);
  };

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(showToast).catch(() => fallbackCopy(text, showToast));
  } else {
    fallbackCopy(text, showToast);
  }
}

function fallbackCopy(text, cb){
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.left = "-9999px";
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try {
    document.execCommand("copy");
  } catch (e) {}
  document.body.removeChild(ta);
  cb();
}

function openGallery(){
  const grid = document.getElementById("gallery-grid");
  grid.innerHTML = results.map(r => `
    <div class="gallery-item">
      <img src="${r.img}" alt="${r.name}">
      <div class="g-info">
        <div class="g-code pixel">${r.code}</div>
        <div class="g-name">${r.name}</div>
        <div class="g-desc">${r.desc}</div>
      </div>
    </div>
  `).join("");
  document.getElementById("gallery").classList.add("open");
}

function closeGallery(){
  document.getElementById("gallery").classList.remove("open");
}
</script>
